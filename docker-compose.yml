services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: teamcoord
      POSTGRES_USER: teamcoord
      POSTGRES_PASSWORD: teamcoord
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcoord -d teamcoord"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/teamcoord
      DB_USER: teamcoord
      DB_PASSWORD: teamcoord
      JWT_SECRET: ${JWT_SECRET:-please-change-this-jwt-secret-32-bytes-min}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-2525}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin12345}
    ports:
      - "8080:8080"

volumes:
  pgdata:
